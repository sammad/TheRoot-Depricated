server.port=8080

# ===========================================
# Service Identity
# ===========================================
spring.application.name=feature-flags
spring.application.version=@project.version@

# ===========================================
# Active Profile (default = JSON logging)
# Set to "dev" for human-readable console logs
# ===========================================
spring.profiles.active=default

# ===========================================
# H2 In-Memory Database
# ===========================================
spring.datasource.url=jdbc:h2:mem:featureflags
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===========================================
# Actuator (health, info, metrics)
# ===========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.info.env.enabled=true

# ===========================================
# Micrometer Tracing (OpenTelemetry)
# Trace IDs are automatically populated into
# MDC for inclusion in structured logs.
# No external exporter is configured — traces
# are visible only in log output.
# ===========================================
management.tracing.sampling.probability=1.0
logging.pattern.level=%5p [%X{traceId:-} %X{spanId:-}]

# ===========================================
# Logging Levels
# ===========================================
logging.level.com.theroot.featureflags=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN
